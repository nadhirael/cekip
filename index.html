<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>IP Checker Pro</title>

  <!-- 🔥 biar gak cache -->
  <meta http-equiv="Cache-Control" content="no-cache">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { font-family: Arial; padding: 20px; }
    li.current { color: green; font-weight: bold; }
    button { margin: 10px 5px; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; }
    #exportBtn { background:#3498db; color:white; }
    #map { height:400px; margin-top:10px; border-radius:8px; }
  </style>
</head>
<body>

<h1>Alamat IP Anda:</h1>
<p id="ip">Memuat...</p>

<h2>Informasi ISP:</h2>
<p id="isp">Memuat...</p>

<h2>Status:</h2>
<p id="security">Memuat...</p>

<h2>Historis IP:</h2>
<input id="filterInput" placeholder="Cari IP / lokasi / ISP..." />
<p>Total: <span id="total">0</span></p>
<ul id="history"></ul>

<button id="exportBtn" onclick="exportCSV()">Export CSV</button>
<button onclick="hapusHistoris()">Hapus</button>

<h2>Peta:</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let map = L.map('map').setView([0,0],2);
let markers = [];

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function renderMapMarkers(history){
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  history.forEach(e=>{
    if(e.lat && e.lon){
      let m = L.marker([e.lat,e.lon]).addTo(map)
      .bindPopup(`<b>${e.ip}</b><br>${e.location}<br>${e.isp.replace(/\n/g,'<br>')}<br><b>${e.status}</b>`);
      markers.push(m);
    }
  });
}

async function getIP(){
  try{
    let data;

    // 🔥 API 1 (paling stabil di GitHub)
    try{
      let r = await fetch('https://ipapi.co/json/');
      let d = await r.json();

      data = {
        ip:d.ip,
        city:d.city,
        country:d.country_name,
        latitude:d.latitude,
        longitude:d.longitude,
        connection:{
          isp:d.org,
          org:d.org,
          asn:d.asn,
          domain:'-'
        }
      };

    }catch{
      // 🔥 fallback API
      let r = await fetch('https://ipwho.is/');
      let d = await r.json();

      if(!d.success) throw new Error();

      data = d;
    }

    if(!data.ip) throw new Error();

    let ip = data.ip;

    let ispData = data.connection || {};
    let isp = `
ISP: ${ispData.isp||'-'}
ORG: ${ispData.org||'-'}
ASN: ${ispData.asn||'-'}
DOMAIN: ${ispData.domain||'-'}
`.trim();

    document.getElementById('ip').textContent = ip;
    document.getElementById('isp').innerHTML = isp.replace(/\n/g,'<br>');

    // status sederhana
    let status = "🟢 Normal";

    document.getElementById('security').innerHTML = `<b>${status}</b>`;

    let history = JSON.parse(localStorage.getItem('ipHistory')) || [];

    if(!history.some(e=>e.ip===ip)){
      history.push({
        ip,
        time:new Date().toLocaleString(),
        location:`${data.city||'-'}, ${data.country||'-'}`,
        lat:data.latitude,
        lon:data.longitude,
        isp,
        status
      });

      localStorage.setItem('ipHistory', JSON.stringify(history));
    }

    renderHistory(history, ip);
    renderMapMarkers(history);

    if(data.latitude){
      map.setView([data.latitude,data.longitude],8);
    }

  }catch(e){
    document.getElementById('ip').textContent = '❌ Gagal load';
    document.getElementById('isp').textContent = '-';
    document.getElementById('security').textContent = '-';
    console.error(e);
  }
}

function renderHistory(h,cur){
  let list=document.getElementById('history');
  list.innerHTML='';
  document.getElementById('total').textContent=h.length;

  h.forEach(e=>{
    let li=document.createElement('li');
    li.innerHTML=`
${e.ip} - ${e.time}<br>
${e.location}<br>
${e.isp.replace(/\n/g,'<br>')}<br>
<b>${e.status}</b>
`;
    if(e.ip===cur) li.classList.add('current');
    list.appendChild(li);
  });
}

function hapusHistoris(){
  localStorage.removeItem('ipHistory');
  location.reload();
}

function exportCSV(){
  let h=JSON.parse(localStorage.getItem('ipHistory'))||[];
  if(!h.length) return alert('Kosong');

  let csv=[['IP','Waktu','Lokasi','ISP','Status'],
    ...h.map(e=>[e.ip,e.time,e.location,e.isp,e.status])]
    .map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');

  let blob=new Blob([csv]);
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ip-history.csv';
  a.click();
}

document.getElementById('filterInput').addEventListener('input',e=>{
  let k=e.target.value.toLowerCase();
  document.querySelectorAll('#history li').forEach(li=>{
    li.style.display = li.textContent.toLowerCase().includes(k) ? '' : 'none';
  });
});

getIP();
</script>

</body>
</html>
