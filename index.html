<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>IP Viewer dengan Lokasi, ISP & Historis + Export CSV</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    li.current {
      color: green;
      font-weight: bold;
    }
    button {
      margin-top: 10px;
      margin-right: 10px;
      padding: 6px 12px;
      background-color: #e74c3c;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background-color: #c0392b;
    }
    #exportBtn {
      background-color: #3498db;
    }
    #exportBtn:hover {
      background-color: #2980b9;
    }
    #map {
      height: 400px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <h1>Alamat IP Anda:</h1>
  <p id="ip">Memuat...</p>

  <h2>Informasi ISP:</h2>
  <p id="isp">Memuat...</p>

  <h2>Historis IP (Tersimpan di Browser):</h2>
  <label>🔍 Filter:
    <input type="text" id="filterInput" placeholder="Cari IP / kota / negara / ISP..." />
  </label>
  <p>Total IP unik: <span id="total">0</span></p>
  <ul id="history"></ul>

  <button id="exportBtn" onclick="exportCSV()">⬇️ Export ke CSV</button>
  <button onclick="hapusHistoris()">🗑️ Hapus Historis</button>

  <h2>Peta Lokasi IP:</h2>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    let map = L.map('map').setView([0, 0], 2);
    let markers = [];

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    function renderMapMarkers(history) {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      history.forEach(entry => {
        if (entry.lat && entry.lon) {
          const marker = L.marker([entry.lat, entry.lon])
            .addTo(map)
            .bindPopup(`<b>${entry.ip}</b><br>${entry.location}<br>ISP: ${entry.isp || '-'}`);
          markers.push(marker);
        }
      });
    }

    async function getIP() {
      try {
        const res = await fetch('https://ipwho.is/');
        const data = await res.json();

        if (!data.success) throw new Error('Gagal ambil data');

        const currentIP = data.ip;
        const isp = data.connection?.isp || '-';

        document.getElementById('ip').textContent = currentIP;
        document.getElementById('isp').textContent = isp;

        let history = JSON.parse(localStorage.getItem('ipHistory')) || [];
        const exists = history.some(entry => entry.ip === currentIP);

        if (!exists) {
          const location = `${data.city || '-'}, ${data.country || '-'}`;
          const lat = data.latitude || null;
          const lon = data.longitude || null;
          const timestamp = new Date().toLocaleString();

          history.push({ 
            ip: currentIP, 
            time: timestamp, 
            location, 
            lat, 
            lon,
            isp
          });

          localStorage.setItem('ipHistory', JSON.stringify(history));
        }

        renderHistory(history, currentIP);
        renderMapMarkers(history);

        // auto zoom ke lokasi terbaru
        if (data.latitude && data.longitude) {
          map.setView([data.latitude, data.longitude], 8);
        }

      } catch (err) {
        document.getElementById('ip').textContent = 'Gagal mengambil IP.';
        document.getElementById('isp').textContent = '-';
        console.error(err);
      }
    }

    function renderHistory(history, currentIP) {
      const list = document.getElementById('history');
      const total = document.getElementById('total');
      list.innerHTML = '';
      total.textContent = history.length;

      history.forEach(entry => {
        const li = document.createElement('li');
        li.textContent = `${entry.ip} - ${entry.time} - ${entry.location} - ISP: ${entry.isp || '-'}`;

        if (entry.ip === currentIP) {
          li.classList.add('current');
          li.textContent += ' ✅ (IP Saat Ini)';
        }

        list.appendChild(li);
      });
    }

    function hapusHistoris() {
      if (confirm('Yakin ingin menghapus seluruh historis IP?')) {
        localStorage.removeItem('ipHistory');
        document.getElementById('history').innerHTML = '';
        document.getElementById('total').textContent = '0';
        alert('Historis telah dihapus.');
        location.reload();
      }
    }

    function exportCSV() {
      let history = JSON.parse(localStorage.getItem('ipHistory')) || [];
      if(history.length === 0){
        alert('Tidak ada data historis untuk diekspor.');
        return;
      }

      const header = ['IP', 'Waktu', 'Lokasi', 'ISP'];

      const rows = history.map(h => [
        h.ip,
        h.time,
        h.location || '',
        h.isp || ''
      ]);

      const csvContent = [header, ...rows]
        .map(e => e.map(v => `"${v.replace(/"/g, '""')}"`).join(','))
        .join('\n');

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `historis-ip-${new Date().toISOString().slice(0,10)}.csv`;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    document.getElementById('filterInput').addEventListener('input', function() {
      const keyword = this.value.toLowerCase();
      const listItems = document.querySelectorAll('#history li');
      listItems.forEach(li => {
        li.style.display = li.textContent.toLowerCase().includes(keyword) ? '' : 'none';
      });
    });

    getIP();
  </script>

</body>
</html>
