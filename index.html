<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Viewer Pro - Lokasi & Historis</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      background-color: #f4f7f6;
      color: #333;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 { color: #2c3e50; margin-top: 0; }
    #ip {
      font-size: 1.5em;
      font-weight: bold;
      color: #2980b9;
      background: #e1f5fe;
      display: inline-block;
      padding: 5px 15px;
      border-radius: 6px;
    }
    li {
      padding: 8px;
      border-bottom: 1px solid #eee;
      list-style: none;
    }
    li.current {
      background-color: #e8f5e9;
      border-left: 5px solid #4caf50;
      font-weight: bold;
    }
    .controls { margin: 20px 0; }
    button {
      padding: 10px 18px;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.3s;
    }
    #exportBtn { background-color: #3498db; color: white; }
    #exportBtn:hover { background-color: #2980b9; }
    .btn-delete { background-color: #e74c3c; color: white; margin-left: 10px; }
    .btn-delete:hover { background-color: #c0392b; }
    
    #map {
      height: 400px;
      margin-top: 20px;
      border: 2px solid #ddd;
      border-radius: 10px;
      z-index: 1;
    }
    #filterInput {
      padding: 8px;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .stats { font-style: italic; color: #666; margin-bottom: 10px; }
    ul { padding: 0; max-height: 300px; overflow-y: auto; border: 1px solid #eee; }
  </style>
</head>
<body>

<div class="container">
  <h1>Alamat IP Anda:</h1>
  <p id="ip">Sedang melacak...</p>

  <h2>Historis IP:</h2>
  <div class="controls">
    <input type="text" id="filterInput" placeholder="🔍 Cari IP, Kota, atau ISP..." />
    <div class="stats">Total IP unik tersimpan: <span id="total">0</span></div>
    <button id="exportBtn" onclick="exportCSV()">⬇️ Export CSV</button>
    <button class="btn-delete" onclick="hapusHistoris()">🗑️ Bersihkan Histori</button>
  </div>
  
  <ul id="history"></ul>

  <h2>Peta Lokasi:</h2>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // Inisialisasi Peta
  let map = L.map('map').setView([0, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  function renderMapMarkers(history) {
    history.forEach(entry => {
      if (entry.lat && entry.lon) {
        L.marker([entry.lat, entry.lon])
          .addTo(map)
          .bindPopup(`<b>${entry.ip}</b><br>${entry.isp}<br>${entry.location}`);
      }
    });
  }

  async function getIP() {
    try {
      // Menggunakan satu API untuk IP + Lokasi + ISP agar lebih efisien & aman HTTPS
      const response = await fetch('https://ipapi.co/json/');
      if (!response.ok) throw new Error('Gagal memanggil API');
      
      const data = await response.json();
      const currentIP = data.ip;
      
      document.getElementById('ip').textContent = currentIP;

      let history = JSON.parse(localStorage.getItem('ipHistory')) || [];
      const exists = history.some(entry => entry.ip === currentIP);

      if (!exists) {
        const entry = {
          ip: currentIP,
          time: new Date().toLocaleString(),
          location: `${data.city || '-'}, ${data.country_name || '-'}`,
          isp: data.org || 'Unknown ISP',
          lat: data.latitude,
          lon: data.longitude
        };
        history.push(entry);
        localStorage.setItem('ipHistory', JSON.stringify(history));
      }

      renderHistory(history, currentIP);
      renderMapMarkers(history);

      // Auto-focus ke lokasi sekarang
      if (data.latitude && data.longitude) {
        map.setView([data.latitude, data.longitude], 10);
      }

    } catch (err) {
      document.getElementById('ip').textContent = 'Gagal Mengambil Data (Cek AdBlock/Koneksi)';
      console.error("Error detail:", err);
    }
  }

  function renderHistory(history, currentIP) {
    const list = document.getElementById('history');
    const total = document.getElementById('total');
    list.innerHTML = '';
    total.textContent = history.length;

    // Tampilkan yang terbaru di atas
    [...history].reverse().forEach(entry => {
      const li = document.createElement('li');
      li.innerHTML = `<strong>${entry.ip}</strong> <small>(${entry.isp})</small><br>
                      <span style="font-size:0.85em; color: #777;">${entry.time} | ${entry.location}</span>`;

      if (entry.ip === currentIP) {
        li.classList.add('current');
        li.innerHTML += ' <span style="color: green;">✅</span>';
      }
      list.appendChild(li);
    });
  }

  function hapusHistoris() {
    if (confirm('Hapus semua catatan histori IP?')) {
      localStorage.removeItem('ipHistory');
      location.reload();
    }
  }

  function exportCSV() {
    let history = JSON.parse(localStorage.getItem('ipHistory')) || [];
    if(history.length === 0) return alert('Data kosong.');
    
    const header = ['IP', 'ISP', 'Waktu', 'Lokasi', 'Lat', 'Lon'];
    const rows = history.map(h => [h.ip, h.isp, h.time, h.location, h.lat, h.lon]);
    
    const csvContent = [header, ...rows]
      .map(e => e.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
      .join('\n');

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `ip-log-${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
  }

  // Live Filter
  document.getElementById('filterInput').addEventListener('input', function() {
    const val = this.value.toLowerCase();
    document.querySelectorAll('#history li').forEach(li => {
      li.style.display = li.textContent.toLowerCase().includes(val) ? '' : 'none';
    });
  });

  getIP();
</script>

</body>
</html>
