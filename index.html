<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Viewer Pro - Lokasi & Historis</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      background-color: #f4f7f6;
      color: #333;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 { color: #2c3e50; margin-top: 0; }
    #ip {
      font-size: 1.5em;
      font-weight: bold;
      color: #2980b9;
      background: #e1f5fe;
      display: inline-block;
      padding: 5px 15px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .controls { margin-bottom: 20px; }
    #filterInput {
      padding: 8px;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 8px 16px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
      margin-right: 5px;
      color: white;
    }
    #exportBtn { background-color: #3498db; }
    .btn-delete { background-color: #e74c3c; }
    
    #map {
      height: 400px;
      margin-top: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      z-index: 1;
    }
    ul {
      padding: 0;
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 4px;
    }
    li {
      padding: 10px;
      border-bottom: 1px solid #eee;
      list-style: none;
      font-size: 14px;
    }
    li.current {
      background-color: #e8f5e9;
      border-left: 5px solid #4caf50;
      font-weight: bold;
    }
    .info-text { font-size: 0.9em; color: #666; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="container">
  <h1>Alamat IP Anda:</h1>
  <p id="ip">Mendeteksi...</p>
  <p id="isp-info" class="info-text">Mencari info provider...</p>

  <h2>Historis IP:</h2>
  <div class="controls">
    <input type="text" id="filterInput" placeholder="🔍 Cari IP atau lokasi..." />
    <button id="exportBtn" onclick="exportCSV()">⬇️ Export CSV</button>
    <button class="btn-delete" onclick="hapusHistoris()">🗑️ Hapus Semua</button>
  </div>
  
  <p class="info-text">Total IP unik tersimpan: <span id="total">0</span></p>
  <ul id="history"></ul>

  <h2>Peta Lokasi:</h2>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  }).addTo(map);

    history.forEach(entry => {

          .addTo(map)

      }
    });
