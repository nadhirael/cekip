<script>
    // ... (kode awal sama)

    async function getIP() {
      try {
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipResponse.json();
        const currentIP = ipData.ip;
        document.getElementById('ip').textContent = currentIP;

        let history = JSON.parse(localStorage.getItem('ipHistory')) || [];
        const exists = history.some(entry => entry.ip === currentIP);

        if (!exists) {
          // Menggunakan ipapi.co (tambahkan field org untuk info ISP)
          const locationResponse = await fetch(`https://ipapi.co/${currentIP}/json/`);
          const loc = await locationResponse.json();
          
          const location = `${loc.city || '-'}, ${loc.country_name || '-'}`;
          const isp = loc.org || 'Unknown ISP'; // Tambahan info ISP
          const lat = loc.latitude;
          const lon = loc.longitude;
          const timestamp = new Date().toLocaleString();

          history.push({ ip: currentIP, time: timestamp, location, isp, lat, lon });
          localStorage.setItem('ipHistory', JSON.stringify(history));
        }

        renderHistory(history, currentIP);
        renderMapMarkers(history);

        // FITUR BARU: Auto-center peta ke IP terbaru
        const currentData = history.find(h => h.ip === currentIP);
        if (currentData && currentData.lat) {
          map.setView([currentData.lat, currentData.lon], 10);
        }

      } catch (err) {
        document.getElementById('ip').textContent = 'Gagal mengambil IP. Cek koneksi atau limit API.';
        console.error(err);
      }
    }

    function renderHistory(history, currentIP) {
      const list = document.getElementById('history');
      const total = document.getElementById('total');
      list.innerHTML = '';
      total.textContent = history.length;

      // Render dari yang terbaru (reverse) supaya enak dilihat
      [...history].reverse().forEach(entry => {
        const li = document.createElement('li');
        // Nambahin ISP di tampilan list
        li.textContent = `${entry.ip} [${entry.isp}] - ${entry.time} - ${entry.location}`;

        if (entry.ip === currentIP) {
          li.classList.add('current');
          li.innerHTML = `<b>${li.textContent} ✅ (IP Saat Ini)</b>`;
        }
        list.appendChild(li);
      });
    }
    // ... (sisa fungsi export & filter tetap sama)
</script>
