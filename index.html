<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPv4 Monitor</title>
    <style>
        body { font-family: sans-serif; background: #0b0f1a; color: #d1d5db; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #161b2a; padding: 20px; border-radius: 12px; border: 1px solid #2d3748; margin-bottom: 20px; }
        .ip-text { font-size: 28px; color: #fbbf24; font-weight: bold; font-family: monospace; display: block; margin: 10px 0; }
        .status-used { background: #7f1d1d; color: #fecaca; padding: 8px; border-radius: 6px; font-weight: bold; display: block; text-align: center; margin-bottom: 15px; border: 1px solid #dc2626; }
        .status-fresh { background: #064e3b; color: #a7f3d0; padding: 8px; border-radius: 6px; font-weight: bold; display: block; text-align: center; margin-bottom: 15px; border: 1px solid #059669; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #2d3748; text-align: left; }
        th { background: #1e293b; color: #60a5fa; }
        button { background: #374151; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Pengecekan IPv4</h2>
        <div id="status-container">Sedang memproses...</div>
        <span id="ip-display" class="ip-text">Mencari IP...</span>
        <div id="isp-display" style="font-size: 0.9em; opacity: 0.8;"></div>
    </div>

    <div class="card">
        <button onclick="clearLogs()" style="float: right;">Reset Histori</button>
        <h3>Histori IP Pernah Terpakai</h3>
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Alamat IP</th>
                </tr>
            </thead>
            <tbody id="log-table"></tbody>
        </table>
    </div>
</div>

<script>
    async function getIP() {
        try {
            // Gunakan Cloudflare Trace (Sangat stabil dan jarang diblokir)
            const response = await fetch('https://1.1.1.1/cdn-cgi/trace');
            const text = await response.text();
            
            // Ekstrak baris IP dari data text Cloudflare
            const lines = text.split('\n');
            const data = {};
            lines.forEach(line => {
                const parts = line.split('=');
                if (parts[1]) data[parts[0]] = parts[1];
            });

            const currentIP = data.ip;
            const logTable = document.getElementById('log-table');
            const statusContainer = document.getElementById('status-container');
            const ipDisplay = document.getElementById('ip-display');

            // Ambil histori
            let history = JSON.parse(localStorage.getItem('user_ip_history')) || [];
            
            // Cek apakah IP sudah ada
            const isUsed = history.includes(currentIP);

            // Update Tampilan Utama
            ipDisplay.innerText = currentIP;
            if (isUsed) {
                statusContainer.innerHTML = '<div class="status-used">⚠️ IP INI SUDAH PERNAH TERPAKAI SEBELUMNYA!</div>';
            } else {
                statusContainer.innerHTML = '<div class="status-fresh">✅ IP FRESH / BELUM TERCATAT</div>';
                // Simpan ke histori jika IP baru
                history.unshift(currentIP);
                localStorage.setItem('user_ip_history', JSON.stringify(history));
            }

            // Update Tabel Histori (Biar tahu IP apa saja yang sudah tersimpan)
            renderTable(history);

        } catch (error) {
            document.getElementById('status-container').innerHTML = "Gagal mengambil data. Coba matikan VPN/Adblock atau buka di browser Chrome biasa.";
            console.error(error);
        }
    }

    function renderTable(history) {
        const tableBody = document.getElementById('log-table');
        tableBody.innerHTML = history.map(ip => `
            <tr>
                <td>${new Date().toLocaleDateString('id-ID')}</td>
                <td style="font-family: monospace; font-weight: bold;">${ip}</td>
            </tr>
        `).join('');
    }

    function clearLogs() {
        if(confirm("Hapus semua catatan histori IP?")) {
            localStorage.removeItem('user_ip_history');
            location.reload();
        }
    }

    getIP();
</script>

</body>
</html>
