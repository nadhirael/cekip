<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Tracker</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 20px; }
        .ip-big { font-size: 24px; color: #fbbf24; font-weight: bold; font-family: monospace; }
        .status-used { color: #ff4444; font-weight: bold; background: #450a0a; padding: 5px; border-radius: 5px; }
        .status-fresh { color: #00ff00; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #334155; padding: 10px; text-align: left; }
        th { background: #0f172a; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Info IP Saat Ini</h2>
        <div id="status-area">Sedang mengecek...</div>
        <div id="ip-display" class="ip-big"></div>
        <div id="detail-area"></div>
    </div>

    <div class="card">
        <button onclick="localStorage.clear(); location.reload();" style="float:right">Reset Histori</button>
        <h2>Histori IP</h2>
        <table id="history-table">
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>IP Address</th>
                    <th>ISP</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

<script>
    async function checkIP() {
        try {
            // Menggunakan API yang lebih stabil dan mendukung HTTPS
            const response = await fetch('https://ipwho.is/');
            const data = await response.json();
            
            if(!data.success) throw new Error("API Error");

            const currentIP = data.ip;
            const currentISP = data.connection.isp;

            // Logika LocalStorage dengan proteksi Error (untuk Incognito)
            let history = [];
            try {
                history = JSON.parse(localStorage.getItem('ip_logs')) || [];
            } catch(e) {
                document.getElementById('status-area').innerHTML = "<b style='color:orange'>Peringatan: Kamu di mode Incognito. Histori tidak bisa disimpan permanen.</b>";
            }

            const isUsed = history.some(item => item.ip === currentIP);

            // Update UI
            document.getElementById('ip-display').innerText = currentIP;
            document.getElementById('status-area').innerHTML = isUsed 
                ? '<span class="status-used">⚠️ IP SUDAH PERNAH TERPAKAI!</span>' 
                : '<span class="status-fresh">✅ IP FRESH (BARU)</span>';
            document.getElementById('detail-area').innerText = "ISP: " + currentISP;

            // Simpan jika IP baru
            if (!isUsed) {
                history.unshift({
                    time: new Date().toLocaleString('id-ID'),
                    ip: currentIP,
                    isp: currentISP
                });
                try {
                    localStorage.setItem('ip_logs', JSON.stringify(history));
                } catch(e) {}
            }

            // Render Tabel
            const tableBody = document.querySelector('#history-table tbody');
            tableBody.innerHTML = history.map(item => `
                <tr>
                    <td>${item.time}</td>
                    <td>${item.ip}</td>
                    <td>${item.isp}</td>
                </tr>
            `).join('');

        } catch (err) {
            document.getElementById('status-area').innerText = "Gagal memuat. Pastikan koneksi internet aktif.";
            console.error(err);
        }
    }

    checkIP();
</script>
</body>
</html>
